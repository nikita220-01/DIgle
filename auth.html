<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Digle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            border: 1px solid #333;
        }
        
        .auth-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #d0d0d0;
            font-style: italic;
            font-style: oblique 30deg;
        }
        
        .auth-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .auth-container button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .auth-container button:hover {
            background-color: #444;
        }
        
        .auth-container .toggle-btn {
            background-color: #666;
        }
        
        .auth-container .back-btn {
            background-color: #444;
            margin-top: 20px;
        }
        
        .error {
            color: #ff6b6b;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="authTitle">Вход</h1>
        <div class="error" id="error"></div>
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="name" placeholder="Имя" style="display: none;">
        <input type="password" id="password" placeholder="Пароль">
        <button id="authBtn">Войти</button>
        <button class="toggle-btn" id="toggleAuthBtn">Создать аккаунт</button>
        <button class="back-btn" id="backBtn">На главную</button>
    </div>
    <button id="apiBtn" title="API settings" style="position:fixed;right:12px;top:12px;background:#222;color:#fff;border:0;padding:8px 10px;border-radius:6px;cursor:pointer;z-index:999">API</button>

    <div id="apiModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:1000">
        <div style="background:#111;padding:20px;border-radius:8px;border:1px solid #333;min-width:320px;color:#fff">
            <h3 style="margin-top:0">API Base URL</h3>
            <input id="apiInput" placeholder="https://your-ngrok.io" style="width:100%;padding:8px;margin-bottom:10px;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:4px">
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button id="saveApiBtn" style="padding:8px 12px;background:#4CAF50;border:0;border-radius:4px;color:#fff;cursor:pointer">Save</button>
                <button id="clearApiBtn" style="padding:8px 12px;background:#666;border:0;border-radius:4px;color:#fff;cursor:pointer">Clear</button>
                <button id="closeApiBtn" style="padding:8px 12px;background:#333;border:0;border-radius:4px;color:#fff;cursor:pointer">Close</button>
            </div>
            <p style="margin-top:12px;color:#aaa">Current: <span id="apiCurrent">(not set)</span></p>
        </div>
    </div>
    
    <script>
        let isLoginMode = true;
        // If URL contains ?api=... set it into localStorage so users can open a link from the tunnel
        (function(){
            try{
                const params = new URLSearchParams(window.location.search);
                const apiParam = params.get('api');
                if(apiParam && apiParam.trim()) {
                    localStorage.setItem('API_BASE', apiParam.trim());
                }
            }catch(e){}
        })();

        const API_BASE = localStorage.getItem('API_BASE') || '';
        
        function getUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : [];
        }
        
        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }
        
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? 'Вход' : 'Регистрация';
            document.getElementById('authBtn').textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
            document.getElementById('toggleAuthBtn').textContent = isLoginMode ? 'Создать аккаунт' : 'Уже есть аккаунт?';
            document.getElementById('name').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('error').textContent = '';
        }
        
        async function detectLocalServer(timeoutMs = 500) {
            const url = 'http://localhost:3000/users';
            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeoutMs);
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(id);
                if (res.ok) return 'http://localhost:3000';
            } catch (e) {
                return '';
            }
            return '';
        }

        async function handleAuth() {
            if (window.location.protocol === 'file:' && !API_BASE) {
                const detected = await detectLocalServer(400);
                if (detected) {
                    window.API_BASE = detected;
                }
            }
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            
            if (!email || !password) {
                document.getElementById('error').textContent = 'Заполните все поля';
                return;
            }
            
            if (!isLoginMode && !name) {
                document.getElementById('error').textContent = 'Заполните имя';
                return;
            }
            
            if (API_BASE) {
                if (isLoginMode) {
                    fetch(API_BASE + '/auth/login', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    }).then(r => r.json()).then(data => {
                        if (data.error) {
                            document.getElementById('error').textContent = data.error;
                            return;
                        }
                        if (email === 'nikilyh20@gmail.com') data.isAdmin = true;
                        // persist user to local users array
                        try {
                            var users = JSON.parse(localStorage.getItem('users') || '[]');
                            if (!users.find(function(u) { return u.id === data.id; })) {
                                users.push({ id: data.id, email: data.email, name: data.name || '', password: data.password || '', avatar: data.avatar, lastNameChange: data.lastNameChange || null });
                                localStorage.setItem('users', JSON.stringify(users));
                            }
                        } catch(e) { console.error('Error persisting user:', e); }
                        localStorage.setItem('user', JSON.stringify(data));
                        window.location.href = 'Index.html';
                    }).catch(err => { document.getElementById('error').textContent = 'Ошибка сети'; });
                } else {
                    fetch(API_BASE + '/auth/register', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, name, password })
                    }).then(r => r.json()).then(data => {
                        if (data.error) {
                            document.getElementById('error').textContent = data.error;
                            return;
                        }
                        if (email === 'nikilyh20@gmail.com') data.isAdmin = true;
                        // persist user to local users array
                        try {
                            var users = JSON.parse(localStorage.getItem('users') || '[]');
                            if (!users.find(function(u) { return u.id === data.id; })) {
                                users.push({ id: data.id, email: data.email, name: data.name || '', password: data.password || '', avatar: data.avatar, lastNameChange: data.lastNameChange || null });
                                localStorage.setItem('users', JSON.stringify(users));
                            }
                        } catch(e) { console.error('Error persisting user:', e); }
                        localStorage.setItem('user', JSON.stringify(data));
                        window.location.href = 'Index.html';
                    }).catch(err => { document.getElementById('error').textContent = 'Ошибка сети'; });
                }
                return;
            }

            const users = getUsers();

            if (isLoginMode) {
                const user = users.find(u => u.email === email);
                if (!user) {
                    document.getElementById('error').textContent = 'Пользователь не найден';
                    return;
                }
                if (user.password !== password) {
                    document.getElementById('error').textContent = 'Неверный пароль';
                    return;
                }
                
                const userToSave = { ...user };
                if (email === 'nikilyh20@gmail.com') userToSave.isAdmin = true;
                localStorage.setItem('user', JSON.stringify(userToSave));
                window.location.href = 'Index.html';
                
            } else {
                const existingUser = users.find(u => u.email === email);
                if (existingUser) {
                    document.getElementById('error').textContent = 'Аккаунт с таким email уже существует';
                    return;
                }
                
                const newUser = {
                    email: email,
                    name: name,
                    password: password,
                    id: 'user_' + Date.now(),
                    lastNameChange: null,
                    avatar: undefined
                };
                if (email === 'nikilyh20@gmail.com') newUser.isAdmin = true;
                
                users.push(newUser);
                saveUsers(users);
                localStorage.setItem('user', JSON.stringify(newUser));
                window.location.href = 'Index.html';
            }
        }
        
        document.getElementById('authBtn').addEventListener('click', handleAuth);
        document.getElementById('toggleAuthBtn').addEventListener('click', toggleAuthMode);
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'Index.html';
        });

        // API settings UI
        const apiBtn = document.getElementById('apiBtn');
        const apiModal = document.getElementById('apiModal');
        const apiInput = document.getElementById('apiInput');
        const apiCurrent = document.getElementById('apiCurrent');
        document.getElementById('saveApiBtn').addEventListener('click', function(){
            const v = apiInput.value.trim();
            if(v) localStorage.setItem('API_BASE', v);
            else localStorage.removeItem('API_BASE');
            updateApiDisplay();
            apiModal.style.display='none';
            location.reload();
        });
        document.getElementById('clearApiBtn').addEventListener('click', function(){
            localStorage.removeItem('API_BASE');
            apiInput.value=''; updateApiDisplay();
        });
        document.getElementById('closeApiBtn').addEventListener('click', function(){ apiModal.style.display='none'; });
        apiBtn.addEventListener('click', function(){ apiInput.value = localStorage.getItem('API_BASE') || ''; apiModal.style.display='flex'; });
        function updateApiDisplay(){ apiCurrent.textContent = localStorage.getItem('API_BASE') || '(not set)'; }
        updateApiDisplay();
    </script>
</body>
</html>
