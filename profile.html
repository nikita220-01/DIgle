<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет пользователя - Digle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #d0d0d0;
            font-style: italic;
            font-style: oblique 30deg;
        }
        
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .profile-info {
            margin-bottom: 20px;
        }
        
        .profile-info p {
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .profile-info strong {
            color: #d0d0d0;
        }
        
        .id-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .id-box {
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 8px 12px;
            font-family: monospace;
            cursor: pointer;
            transition: border-color 0.3s;
            flex: 1;
        }
        
        .id-box:hover {
            border-color: #4CAF50;
        }
        
        .copy-btn {
            background-color: #333;
            border: 1px solid #444;
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        
        .copy-btn:hover {
            background-color: #444;
        }
        
        .avatar-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #333;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #444;
            overflow: hidden;
        }
        
        .avatar-preview svg {
            width: 80%;
            height: 80%;
        }
        
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .avatar-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s;
            overflow: hidden;
        }
        
        .avatar-option:hover {
            border-color: #666;
        }
        
        .avatar-option.selected {
            border-color: #4CAF50;
        }
        
        .avatar-option svg {
            width: 80%;
            height: 80%;
        }
        
        .change-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        
        .change-section h3 {
            margin-bottom: 15px;
            color: #d0d0d0;
        }
        
        .change-section input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .change-section button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .change-section button:hover {
            background-color: #444;
        }
        
        .change-section button:disabled {
            background-color: #222;
            cursor: not-allowed;
            color: #666;
        }
        
        .error {
            color: #ff6b6b;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .success {
            color: #4CAF50;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .cooldown-info {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .logout-btn {
            width: 100%;
            padding: 12px;
            background-color: #666;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        
        .logout-btn:hover {
            background-color: #777;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #333;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .close-btn:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">Закрыть</button>
    <h1>Кабинет пользователя</h1>
    
    <div class="profile-container">
        <div class="avatar-section">
            <div class="avatar-preview" id="avatarPreview"></div>
            <h3>Выберите аватар</h3>
            <div class="avatar-grid" id="avatarGrid"></div>
        </div>
        
        <div class="profile-info">
            <p><strong>Имя:</strong> <span id="userName">-</span></p>
            <p><strong>Email:</strong> <span id="userEmail">-</span></p>
            <p><strong>ID пользователя:</strong></p>
            <div class="id-container">
                <div class="id-box" id="userId" title="Нажмите, чтобы скопировать">-</div>
                <button class="copy-btn" id="copyIdBtn">Копировать</button>
            </div>
        </div>
        
        <div class="change-section">
            <h3>Изменить имя</h3>
            <div class="error" id="nameError"></div>
            <div class="success" id="nameSuccess"></div>
            <input type="text" id="newName" placeholder="Новое имя">
            <button id="changeNameBtn">Изменить имя</button>
            <div class="cooldown-info" id="nameCooldownInfo"></div>
        </div>
        
        <div class="change-section">
            <h3>Изменить email</h3>
            <div class="error" id="emailError"></div>
            <div class="success" id="emailSuccess"></div>
            <input type="email" id="newEmail" placeholder="Новый email">
            <button id="changeEmailBtn">Изменить email</button>
        </div>
        
        <button class="logout-btn" id="logoutBtn">Выйти из профиля</button>
    </div>
    
    <script>
        const avatarPreview = document.getElementById('avatarPreview');
        const avatarGrid = document.getElementById('avatarGrid');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userId = document.getElementById('userId');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const newName = document.getElementById('newName');
        const changeNameBtn = document.getElementById('changeNameBtn');
        const newEmail = document.getElementById('newEmail');
        const changeEmailBtn = document.getElementById('changeEmailBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const nameError = document.getElementById('nameError');
        const nameSuccess = document.getElementById('nameSuccess');
        const emailError = document.getElementById('emailError');
        const emailSuccess = document.getElementById('emailSuccess');
        const nameCooldownInfo = document.getElementById('nameCooldownInfo');
        
        let currentUser = null;
        
        const predefinedAvatars = [
            { color: '#333' },
            { color: '#4CAF50' },
            { color: '#2196F3' },
            { color: '#9C27B0' },
            { color: '#FF5722' },
            { color: '#FFC107' },
            { color: '#F44336' },
            { color: '#00BCD4' }
        ];
        
        const personSVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" fill="#ffffff"/><path d="M12 14c-4.42 0-8 2.69-8 6v2h16v-2c0-3.31-3.58-6-8-6z" fill="#ffffff"/></svg>';
        
        function initAvatarGrid() {
            avatarGrid.innerHTML = '';
            predefinedAvatars.forEach((avatar, index) => {
                const option = document.createElement('div');
                option.className = 'avatar-option';
                option.style.backgroundColor = avatar.color;
                option.innerHTML = personSVG;
                option.dataset.index = index;
                
                if (currentUser.avatar === index) {
                    option.classList.add('selected');
                }
                
                option.addEventListener('click', () => selectAvatar(index));
                avatarGrid.appendChild(option);
            });
        }
        
        function selectAvatar(index) {
            currentUser.avatar = index;
            localStorage.setItem('user', JSON.stringify(currentUser));
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            updateAvatarPreview();
            initAvatarGrid();
            
            if (window.opener) {
                window.opener.location.reload();
            }
        }
        
        function updateAvatarPreview() {
            if (currentUser.avatar !== undefined && predefinedAvatars[currentUser.avatar]) {
                const avatar = predefinedAvatars[currentUser.avatar];
                avatarPreview.style.backgroundColor = avatar.color;
                avatarPreview.innerHTML = personSVG;
            } else {
                avatarPreview.style.backgroundColor = '#333';
                avatarPreview.innerHTML = personSVG;
            }
        }
        
        function loadUserData() {
            const user = localStorage.getItem('user');
            if (user) {
                currentUser = JSON.parse(user);
                userName.textContent = currentUser.name || 'Не указано';
                userEmail.textContent = currentUser.email;
                userId.textContent = currentUser.id;
                updateAvatarPreview();
                initAvatarGrid();
                checkNameChangeCooldown();
            } else {
                window.close();
                if (window.opener) {
                    window.opener.location.href = 'auth.html';
                }
            }
        }
        
        function checkNameChangeCooldown() {
            if (!currentUser.lastNameChange) {
                changeNameBtn.disabled = false;
                nameCooldownInfo.textContent = '';
                return;
            }
            
            const lastChange = new Date(currentUser.lastNameChange);
            const now = new Date();
            const daysSinceChange = (now - lastChange) / (1000 * 60 * 60 * 24);
            
            if (daysSinceChange >= 24) {
                changeNameBtn.disabled = false;
                nameCooldownInfo.textContent = '';
            } else {
                changeNameBtn.disabled = true;
                const daysLeft = Math.ceil(24 - daysSinceChange);
                nameCooldownInfo.textContent = 'Можно изменить имя через ' + daysLeft + ' дней';
            }
        }
        
        function changeName() {
            const name = newName.value.trim();
            
            if (!name) {
                nameError.textContent = 'Введите новое имя';
                nameSuccess.textContent = '';
                return;
            }
            
            if (name === currentUser.name) {
                nameError.textContent = 'Новое имя должно отличаться от текущего';
                nameSuccess.textContent = '';
                return;
            }
            
            if (currentUser.lastNameChange) {
                const lastChange = new Date(currentUser.lastNameChange);
                const now = new Date();
                const daysSinceChange = (now - lastChange) / (1000 * 60 * 60 * 24);
                
                if (daysSinceChange < 24) {
                    nameError.textContent = 'Можно менять имя только раз в 24 дня';
                    nameSuccess.textContent = '';
                    return;
                }
            }
            
            currentUser.name = name;
            currentUser.lastNameChange = new Date().toISOString();
            
            localStorage.setItem('user', JSON.stringify(currentUser));
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            userName.textContent = name;
            newName.value = '';
            nameError.textContent = '';
            nameSuccess.textContent = 'Имя успешно изменено!';
            
            checkNameChangeCooldown();
            
            if (window.opener) {
                window.opener.location.reload();
            }
        }
        
        function changeEmail() {
            const email = newEmail.value.trim();
            
            if (!email) {
                emailError.textContent = 'Введите новый email';
                emailSuccess.textContent = '';
                return;
            }
            
            if (email === currentUser.email) {
                emailError.textContent = 'Новый email должен отличаться от текущего';
                emailSuccess.textContent = '';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const existingUser = users.find(u => u.email === email && u.id !== currentUser.id);
            if (existingUser) {
                emailError.textContent = 'Этот email уже занят';
                emailSuccess.textContent = '';
                return;
            }
            
            currentUser.email = email;
            
            localStorage.setItem('user', JSON.stringify(currentUser));
            
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            userEmail.textContent = email;
            newEmail.value = '';
            emailError.textContent = '';
            emailSuccess.textContent = 'Email успешно изменен! Письмо отправлено на ' + email;
            
            if (window.opener) {
                window.opener.location.reload();
            }
        }
        
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('user');
            window.close();
            if (window.opener) {
                window.opener.location.reload();
            }
        });
        
        changeNameBtn.addEventListener('click', changeName);
        changeEmailBtn.addEventListener('click', changeEmail);
        
        function copyId() {
            const idText = userId.textContent;
            if (idText && idText !== '-') {
                navigator.clipboard.writeText(idText).then(() => {
                    copyIdBtn.textContent = 'Скопировано!';
                    setTimeout(() => {
                        copyIdBtn.textContent = 'Копировать';
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy:', err);
                });
            }
        }
        
        userId.addEventListener('click', copyId);
        copyIdBtn.addEventListener('click', copyId);
        
        loadUserData();
    </script>
</body>
</html>
