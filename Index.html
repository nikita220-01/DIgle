<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        nav {
            background-color: #0a0a0a;
            padding: 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }
        
        .logo {
            font-size: 48px;
            font-style: italic;
            font-style: oblique 30deg;
            color: #d0d0d0;
            letter-spacing: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        .burger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            z-index: 5;
        }
        
        .burger span {
            width: 30px;
            height: 3px;
            background-color: #ffffff;
            margin: 3px 0;
            transition: 0.3s;
        }
        
        .burger-menu {
            display: none;
            position: absolute;
            top: 70px;
            left: 20px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            z-index: 100;
            min-width: 200px;
        }
        
        .burger-menu.active {
            display: block;
        }
        
        .burger-menu button {
            background-color: #333;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 5px;
            text-align: left;
        }
        
        .burger-menu button:hover {
            background-color: #444;
        }
        
        .user-icon {
            z-index: 5;
            cursor: pointer;
            padding: 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #444;
            transition: border-color 0.3s;
            overflow: hidden;
        }
        
        .user-avatar svg {
            width: 70%;
            height: 70%;
        }
        
        .user-avatar.authenticated {
            border-color: #4CAF50;
        }
        
        .user-menu {
            display: none;
            position: absolute;
            top: 70px;
            right: 20px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            z-index: 100;
            min-width: 150px;
        }
        
        .user-menu.active {
            display: block;
        }
        
        .user-menu button {
            background-color: #333;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 5px;
        }
        
        .user-menu button:hover {
            background-color: #444;
        }
        
        .user-menu .logout-btn {
            background-color: #666;
        }
        
        .user-menu .logout-btn:hover {
            background-color: #777;
        }
        
        .friends-bar {
            background-color: #0a0a0a;
            padding: 10px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        
        .friend-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #444;
            cursor: pointer;
            transition: border-color 0.3s;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .friend-avatar svg {
            width: 70%;
            height: 70%;
        }
        
        .friend-avatar:hover {
            border-color: #666;
        }
        
        .friend-avatar.active {
            border-color: #4CAF50;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.sent {
            align-self: flex-end;
            background-color: #1a1a1a;
            border: 1px solid #333;
        }
        
        .message.received {
            align-self: flex-start;
            background-color: #2a2a2a;
            border: 1px solid #444;
        }
        
        .message.sent::before,
        .message.received::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.1'/%3E%3C/svg%3E");
            pointer-events: none;
            border-radius: 12px;
        }
        
        .message-time {
            font-size: 11px;
            color: #666;
            text-align: right;
            margin-top: 4px;
        }
        
        .chat-input-container {
            background-color: #0a0a0a;
            padding: 15px 20px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 24px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input:focus {
            border-color: #444;
        }
        
        .chat-send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #333;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }
        
        .chat-send-btn:hover {
            background-color: #444;
        }
        
        .chat-send-btn svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }
        
        .friend-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .friend-modal.active {
            display: flex;
        }
        
        .friend-modal-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            border: 1px solid #333;
        }
        
        .friend-modal-content h2 {
            margin-bottom: 20px;
            color: #d0d0d0;
            font-style: italic;
            font-style: oblique 30deg;
        }
        
        .friend-modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .friend-modal-content button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .friend-modal-content button:hover {
            background-color: #444;
        }
        
        .friend-modal-content .cancel-btn {
            background-color: #666;
        }
        
        .friend-modal-content .success-btn {
            background-color: #4CAF50;
        }
        
        .friend-modal-content .success-btn:hover {
            background-color: #45a049;
        }
        
        .friend-result {
            background-color: #0a0a0a;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        
        .friend-result p {
            margin-bottom: 10px;
        }
        
        .friend-result strong {
            color: #d0d0d0;
        }
        
        .notification-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .notification-modal.active {
            display: flex;
        }
        
        .notification-modal-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            border: 1px solid #333;
        }
        
        .notification-modal-content h2 {
            margin-bottom: 20px;
            color: #d0d0d0;
            font-style: italic;
            font-style: oblique 30deg;
        }
        
        .notification-modal-content p {
            margin-bottom: 20px;
            color: #888;
        }
        
        .notification-modal-content button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .notification-modal-content button:hover {
            background-color: #444;
        }
        
        .notification-modal-content .accept-btn {
            background-color: #4CAF50;
        }
        
        .notification-modal-content .accept-btn:hover {
            background-color: #45a049;
        }
        
        .notification-modal-content .reject-btn {
            background-color: #F44336;
        }
        
        .notification-modal-content .reject-btn:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <nav>
        <div class="burger" id="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="logo">Digle</div>
        <div class="user-icon" id="userIcon">
            <div class="user-avatar" id="userAvatar"></div>
        </div>
        <div class="user-menu" id="userMenu">
            <button id="profileBtn">Кабинет</button>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
    </nav>
    
    <div class="burger-menu" id="burgerMenu">
        <button id="findFriendBtn">Найти друга</button>
    </div>
    
    <div class="friends-bar" id="friendsBar"></div>
    
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Написать сообщение...">
            <button class="chat-send-btn" id="chatSendBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div class="friend-modal" id="friendModal">
        <div class="friend-modal-content">
            <h2>Найти друга</h2>
            <div id="friendResult"></div>
            <input type="text" id="friendIdInput" placeholder="Введите ID пользователя">
            <button id="searchFriendBtn">Найти</button>
            <button id="addFriendBtn" style="display: none;">Добавить</button>
            <button class="cancel-btn" id="closeFriendModalBtn">Отмена</button>
        </div>
    </div>
    
    <div class="notification-modal" id="notificationModal">
        <div class="notification-modal-content">
            <h2>Запрос в друзья</h2>
            <p id="notificationText"></p>
            <button class="accept-btn" id="acceptFriendBtn">Да, добавить</button>
            <button class="reject-btn" id="rejectFriendBtn">Нет</button>
        </div>
    </div>
    
    <script>
        const burger = document.getElementById('burger');
        const burgerMenu = document.getElementById('burgerMenu');
        const userIcon = document.getElementById('userIcon');
        const userAvatar = document.getElementById('userAvatar');
        const userMenu = document.getElementById('userMenu');
        const profileBtn = document.getElementById('profileBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const findFriendBtn = document.getElementById('findFriendBtn');
        const friendsBar = document.getElementById('friendsBar');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatMessages = document.getElementById('chatMessages');
        const friendModal = document.getElementById('friendModal');
        const friendIdInput = document.getElementById('friendIdInput');
        const searchFriendBtn = document.getElementById('searchFriendBtn');
        const addFriendBtn = document.getElementById('addFriendBtn');
        const closeFriendModalBtn = document.getElementById('closeFriendModalBtn');
        const friendResult = document.getElementById('friendResult');
        const notificationModal = document.getElementById('notificationModal');
        const notificationText = document.getElementById('notificationText');
        const acceptFriendBtn = document.getElementById('acceptFriendBtn');
        const rejectFriendBtn = document.getElementById('rejectFriendBtn');
        
        const predefinedAvatars = [
            { color: '#333' },
            { color: '#4CAF50' },
            { color: '#2196F3' },
            { color: '#9C27B0' },
            { color: '#FF5722' },
            { color: '#FFC107' },
            { color: '#F44336' },
            { color: '#00BCD4' }
        ];
        
        const personSVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" fill="#ffffff"/><path d="M12 14c-4.42 0-8 2.69-8 6v2h16v-2c0-3.31-3.58-6-8-6z" fill="#ffffff"/></svg>';
        
        let currentUser = null;
        let foundUser = null;
        let pendingRequest = null;
        let selectedFriend = null;
        
        function checkAuth() {
            const user = localStorage.getItem('user');
            if (user) {
                currentUser = JSON.parse(user);
                userAvatar.classList.add('authenticated');
                
                if (currentUser.avatar !== undefined && predefinedAvatars[currentUser.avatar]) {
                    const avatar = predefinedAvatars[currentUser.avatar];
                    userAvatar.style.backgroundColor = avatar.color;
                    userAvatar.innerHTML = personSVG;
                } else {
                    userAvatar.style.backgroundColor = '#333';
                    userAvatar.innerHTML = personSVG;
                }
                
                loadFriends();
                checkFriendRequests();
            } else {
                userAvatar.classList.remove('authenticated');
                userAvatar.style.backgroundColor = '#333';
                userAvatar.innerHTML = personSVG;
            }
        }
        
        function getFriendRequests() {
            const requests = localStorage.getItem('friendRequests');
            return requests ? JSON.parse(requests) : [];
        }
        
        function saveFriendRequests(requests) {
            localStorage.setItem('friendRequests', JSON.stringify(requests));
        }
        
        function getFriends() {
            const friends = localStorage.getItem('friends');
            return friends ? JSON.parse(friends) : [];
        }
        
        function saveFriends(friends) {
            localStorage.setItem('friends', JSON.stringify(friends));
        }
        
        function loadFriends() {
            if (!currentUser) return;
            
            const friends = getFriends();
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            const myFriends = friends.filter(f => f.user1 === currentUser.id || f.user2 === currentUser.id);
            
            friendsBar.innerHTML = '';
            
            myFriends.forEach(friendship => {
                const friendId = friendship.user1 === currentUser.id ? friendship.user2 : friendship.user1;
                const friend = users.find(u => u.id === friendId);
                
                if (friend) {
                    const friendAvatar = document.createElement('div');
                    friendAvatar.className = 'friend-avatar';
                    
                    if (friend.avatar !== undefined && predefinedAvatars[friend.avatar]) {
                        const avatar = predefinedAvatars[friend.avatar];
                        friendAvatar.style.backgroundColor = avatar.color;
                    }
                    
                    friendAvatar.innerHTML = personSVG;
                    friendAvatar.dataset.friendId = friendId;
                    
                    if (selectedFriend && selectedFriend.id === friendId) {
                        friendAvatar.classList.add('active');
                    }
                    
                    friendAvatar.addEventListener('click', () => selectFriend(friend));
                    friendsBar.appendChild(friendAvatar);
                }
            });
        }
        
        function selectFriend(friend) {
            selectedFriend = friend;
            loadFriends();
            loadChatMessages();
        }
        
        function getChatMessages() {
            const messages = localStorage.getItem('chatMessages');
            return messages ? JSON.parse(messages) : [];
        }
        
        function saveChatMessages(messages) {
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }
        
        function loadChatMessages() {
            chatMessages.innerHTML = '';
            
            if (!selectedFriend) {
                chatMessages.innerHTML = '<p style="color: #666; text-align: center; margin-top: 20px;">Выберите друга для начала чата</p>';
                return;
            }
            
            const allMessages = getChatMessages();
            const chatId = getChatId(currentUser.id, selectedFriend.id);
            const messages = allMessages.filter(m => m.chatId === chatId);
            
            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = msg.from === currentUser.id ? 'message sent' : 'message received';
                
                const textDiv = document.createElement('div');
                textDiv.textContent = msg.text;
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                const date = new Date(msg.timestamp);
                timeDiv.textContent = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
                
                messageDiv.appendChild(textDiv);
                messageDiv.appendChild(timeDiv);
                
                chatMessages.appendChild(messageDiv);
            });
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function getChatId(user1, user2) {
            return [user1, user2].sort().join('_');
        }
        
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || !selectedFriend) return;
            
            const allMessages = getChatMessages();
            const chatId = getChatId(currentUser.id, selectedFriend.id);
            
            const newMessage = {
                chatId: chatId,
                from: currentUser.id,
                to: selectedFriend.id,
                text: text,
                timestamp: Date.now()
            };
            
            allMessages.push(newMessage);
            saveChatMessages(allMessages);
            
            chatInput.value = '';
            loadChatMessages();
        }
        
        function checkFriendRequests() {
            if (!currentUser) return;
            
            const requests = getFriendRequests();
            const pendingRequest = requests.find(r => r.to === currentUser.id && r.status === 'pending');
            
            if (pendingRequest) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const fromUser = users.find(u => u.id === pendingRequest.from);
                
                if (fromUser) {
                    notificationText.textContent = fromUser.name + ' хочет добавить вас в друзья. Нравится ли вы общаться с этим человеком?';
                    window.pendingRequest = pendingRequest;
                    notificationModal.classList.add('active');
                }
            }
        }
        
        function searchFriend() {
            const friendId = friendIdInput.value.trim();
            
            if (!friendId) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Введите ID пользователя</p>';
                return;
            }
            
            if (friendId === currentUser.id) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Нельзя добавить самого себя</p>';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.id === friendId);
            
            if (!user) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Пользователь не найден</p>';
                addFriendBtn.style.display = 'none';
                return;
            }
            
            const friends = getFriends();
            const alreadyFriends = friends.some(f => 
                (f.user1 === currentUser.id && f.user2 === friendId) ||
                (f.user1 === friendId && f.user2 === currentUser.id)
            );
            
            if (alreadyFriends) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Вы уже друзья с этим пользователем</p>';
                addFriendBtn.style.display = 'none';
                return;
            }
            
            foundUser = user;
            friendResult.innerHTML = '<p><strong>Имя:</strong> ' + user.name + '</p><p><strong>ID:</strong> ' + user.id + '</p>';
            addFriendBtn.style.display = 'block';
        }
        
        function sendFriendRequest() {
            if (!foundUser) return;
            
            const requests = getFriendRequests();
            
            const existingRequest = requests.find(r => 
                (r.from === currentUser.id && r.to === foundUser.id) ||
                (r.from === foundUser.id && r.to === currentUser.id)
            );
            
            if (existingRequest) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Запрос уже существует</p>';
                return;
            }
            
            const newRequest = {
                from: currentUser.id,
                to: foundUser.id,
                status: 'pending',
                timestamp: Date.now()
            };
            
            requests.push(newRequest);
            saveFriendRequests(requests);
            
            friendResult.innerHTML = '<p style="color: #4CAF50;">Запрос отправлен!</p>';
            addFriendBtn.style.display = 'none';
            friendIdInput.value = '';
        }
        
        function acceptFriendRequest() {
            if (!window.pendingRequest) return;
            
            const requests = getFriendRequests();
            const requestIndex = requests.findIndex(r => r.from === window.pendingRequest.from && r.to === window.pendingRequest.to);
            
            if (requestIndex !== -1) {
                requests[requestIndex].status = 'accepted';
                saveFriendRequests(requests);
                
                const friends = getFriends();
                friends.push({
                    user1: window.pendingRequest.from,
                    user2: window.pendingRequest.to,
                    timestamp: Date.now()
                });
                saveFriends(friends);
                
                loadFriends();
            }
            
            notificationModal.classList.remove('active');
            window.pendingRequest = null;
        }
        
        function rejectFriendRequest() {
            if (!window.pendingRequest) return;
            
            const requests = getFriendRequests();
            const filteredRequests = requests.filter(r => 
                !(r.from === window.pendingRequest.from && r.to === window.pendingRequest.to)
            );
            saveFriendRequests(filteredRequests);
            
            notificationModal.classList.remove('active');
            window.pendingRequest = null;
        }
        
        burger.addEventListener('click', () => {
            burgerMenu.classList.toggle('active');
        });
        
        userIcon.addEventListener('click', (e) => {
            const user = localStorage.getItem('user');
            if (user) {
                e.preventDefault();
                userMenu.classList.toggle('active');
            } else {
                window.location.href = 'auth.html';
            }
        });
        
        profileBtn.addEventListener('click', () => {
            userMenu.classList.remove('active');
            window.open('profile.html', '_blank');
        });
        
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('user');
            userMenu.classList.remove('active');
            checkAuth();
        });
        
        findFriendBtn.addEventListener('click', () => {
            if (!currentUser) {
                window.location.href = 'auth.html';
                return;
            }
            burgerMenu.classList.remove('active');
            friendModal.classList.add('active');
        });
        
        closeFriendModalBtn.addEventListener('click', () => {
            friendModal.classList.remove('active');
            friendResult.innerHTML = '';
            friendIdInput.value = '';
            addFriendBtn.style.display = 'none';
            foundUser = null;
        });
        
        searchFriendBtn.addEventListener('click', searchFriend);
        
        addFriendBtn.addEventListener('click', sendFriendRequest);
        
        acceptFriendBtn.addEventListener('click', acceptFriendRequest);
        
        rejectFriendBtn.addEventListener('click', rejectFriendRequest);
        
        chatSendBtn.addEventListener('click', sendMessage);
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!burger.contains(e.target) && !burgerMenu.contains(e.target)) {
                burgerMenu.classList.remove('active');
            }
            if (!userIcon.contains(e.target) && !userMenu.contains(e.target)) {
                userMenu.classList.remove('active');
            }
        });
        
        checkAuth();
        loadChatMessages();
    </script>
</body>
</html>
