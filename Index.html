<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }
        
        nav {
            background-color: #0a0a0a;
            padding: 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        
        .logo {
            font-size: 48px;
            font-style: italic;
            font-style: oblique 30deg;
            color: #d0d0d0;
            letter-spacing: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .burger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            z-index: 1;
        }
        
        .burger span {
            width: 30px;
            height: 3px;
            background-color: #ffffff;
            margin: 3px 0;
            transition: 0.3s;
        }
        
        .user-icon {
            cursor: pointer;
            padding: 10px;
        }
        
        .user-icon svg {
            width: 30px;
            height: 30px;
            fill: #ffffff;
        }
    </style>
</head>
<body>
    <nav>
        <div class="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="logo">Digle</div>
        <div class="user-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
    </nav>
</body>
</html>
