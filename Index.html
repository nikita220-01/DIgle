<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        nav {
            background-color: #0a0a0a;
            padding: 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }
        
        .logo {
            font-size: 48px;
            font-style: italic;
            font-style: oblique 30deg;
            color: #d0d0d0;
            letter-spacing: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        .burger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            z-index: 5;
        }
        
        .burger span {
            width: 30px;
            height: 3px;
            background-color: #ffffff;
            margin: 3px 0;
            transition: 0.3s;
        }
        
        .burger-menu {
            display: none;
            position: absolute;
            top: 70px;
            left: 20px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            z-index: 100;
            min-width: 200px;
        }
        
        .burger-menu.active {
            display: block;
        }
        
        .burger-menu button {
            background-color: #333;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 5px;
            text-align: left;
        }
        
        .burger-menu button:hover {
            background-color: #444;
        }
        
        .user-icon {
            z-index: 5;
            cursor: pointer;
            padding: 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #444;
            transition: border-color 0.3s;
            overflow: hidden;
        }
        
        .user-avatar svg {
            width: 70%;
            height: 70%;
        }
        
        .user-avatar.authenticated {
            border-color: #4CAF50;
        }
        
        .user-menu {
            display: none;
            position: absolute;
            top: 70px;
            right: 20px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            z-index: 100;
            min-width: 150px;
        }
        
        .user-menu.active {
            display: block;
        }
        
        .user-menu button {
            background-color: #333;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 5px;
        }
        
        .user-menu button:hover {
            background-color: #444;
        }
        
        .user-menu .logout-btn {
            background-color: #666;
        }
        
        .user-menu .logout-btn:hover {
            background-color: #777;
        }
        
        .friends-bar {
            background-color: #0a0a0a;
            padding: 10px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        
        .friend-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #444;
            cursor: pointer;
            transition: border-color 0.3s;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .friend-avatar svg {
            width: 70%;
            height: 70%;
        }
        
        .friend-avatar:hover {
            border-color: #666;
        }
        
        .friend-avatar.active {
            border-color: #4CAF50;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.received {
            align-self: flex-start;
            flex-direction: row;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid #444;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            position: relative;
            background-color: #2a2a2a;
            border: 1px solid #444;
        }

        .message.sent .message-bubble {
            background-color: #1a1a1a;
            border: 1px solid #333;
        }
        
        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background-color: #ff4d4d;
            color: #fff;
            font-weight: bold;
            display: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .message-bubble:hover .delete-btn {
            display: flex;
        }

        .chat-open-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background-color: #333;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        .message.sent::before,
        .message.received::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.1'/%3E%3C/svg%3E");
            pointer-events: none;
            border-radius: 12px;
        }
        
        .message-time {
            font-size: 11px;
            color: #666;
            text-align: right;
            margin-top: 4px;
        }
        
        .chat-input-container {
            background-color: #0a0a0a;
            padding: 15px 20px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 24px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input:focus {
            border-color: #444;
        }
        
        .chat-send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #333;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
            z-index: 1000;
            position: relative;
            pointer-events: auto;
        }
        
        .chat-send-btn:hover {
            background-color: #444;
        }
        
        .chat-send-btn svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            pointer-events: none;
        }
        
        .friend-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .friend-modal.active {
            display: flex;
        }
        
        .friend-modal-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            border: 1px solid #333;
        }
        
        .friend-modal-content h2 {
            margin-bottom: 20px;
            color: #d0d0d0;
            font-style: italic;
            font-style: oblique 30deg;
        }
        
        .friend-modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .friend-modal-content button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .friend-modal-content button:hover {
            background-color: #444;
        }
        
        .friend-modal-content .cancel-btn {
            background-color: #666;
        }
        
        .friend-modal-content .success-btn {
            background-color: #4CAF50;
        }
        
        .friend-modal-content .success-btn:hover {
            background-color: #45a049';
        }
        
        .friend-result {
            background-color: #0a0a0a;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        
        .friend-result p {
            margin-bottom: 10px;
        }
        
        .friend-result strong {
            color: #d0d0d0;
        }
        
        .notification-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .notification-modal.active {
            display: flex;
        }
        
        .notification-modal-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            border: 1px solid #333;
        }
        
        .notification-modal-content h2 {
            margin-bottom: 20px;
            color: #d0d0d0;
            font-style: italic;
            font-style: oblique 30deg;
        }
        
        .notification-modal-content p {
            margin-bottom: 20px;
            color: #888;
        }
        
        .notification-modal-content button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .notification-modal-content button:hover {
            background-color: #444;
        }
        
        .notification-modal-content .accept-btn {
            background-color: #4CAF50;
        }
        
        .notification-modal-content .accept-btn:hover {
            background-color: #45a049';
        }
        
        .notification-modal-content .reject-btn {
            background-color: #F44336;
        }
        
        .notification-modal-content .reject-btn:hover {
            background-color: #d32f2f';
        }
    </style>
</head>
<body>
    <nav>
        <div class="burger" id="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="logo">Digle</div>
        <div class="user-icon" id="userIcon">
            <div class="user-avatar" id="userAvatar"></div>
        </div>
        <div class="user-menu" id="userMenu">
            <button id="profileBtn">Кабинет</button>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
    </nav>
    
    <div class="burger-menu" id="burgerMenu">
        <button id="findFriendBtn">Найти друга</button>
    </div>
    
    <div class="friends-bar" id="friendsBar"></div>
    
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Написать сообщение...">
            <button class="chat-open-btn" id="openChatWindowBtn" title="Открыть чат в окне">⬚</button>
            <button class="chat-send-btn" id="chatSendBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div class="friend-modal" id="friendModal">
        <div class="friend-modal-content">
            <h2>Найти друга</h2>
            <div id="friendResult"></div>
            <input type="text" id="friendIdInput" placeholder="Введите ID пользователя">
            <button id="searchFriendBtn">Найти</button>
            <button id="addFriendBtn" style="display: none;">Добавить</button>
            <button class="cancel-btn" id="closeFriendModalBtn">Отмена</button>
        </div>
    </div>
    
    <div class="notification-modal" id="notificationModal">
        <div class="notification-modal-content">
            <h2>Запрос в друзья</h2>
            <p id="notificationText"></p>
            <button class="accept-btn" id="acceptFriendBtn">Да, добавить</button>
            <button class="reject-btn" id="rejectFriendBtn">Нет</button>
        </div>
    </div>
    
    <script>
        console.log('Script started');
        // set API_BASE to your server address (e.g. 'http://localhost:3000') to enable cross-device sync
        const API_BASE = '';
        
        var burger = document.getElementById('burger');
        var burgerMenu = document.getElementById('burgerMenu');
        var userIcon = document.getElementById('userIcon');
        var userAvatar = document.getElementById('userAvatar');
        var userMenu = document.getElementById('userMenu');
        var profileBtn = document.getElementById('profileBtn');
        var logoutBtn = document.getElementById('logoutBtn');
        var findFriendBtn = document.getElementById('findFriendBtn');
        var friendsBar = document.getElementById('friendsBar');
        var chatInput = document.getElementById('chatInput');
        var chatSendBtn = document.getElementById('chatSendBtn');
        var chatMessages = document.getElementById('chatMessages');
        var friendModal = document.getElementById('friendModal');
        var friendIdInput = document.getElementById('friendIdInput');
        var searchFriendBtn = document.getElementById('searchFriendBtn');
        var addFriendBtn = document.getElementById('addFriendBtn');
        var closeFriendModalBtn = document.getElementById('closeFriendModalBtn');
        var friendResult = document.getElementById('friendResult');
        var notificationModal = document.getElementById('notificationModal');
        var notificationText = document.getElementById('notificationText');
        var acceptFriendBtn = document.getElementById('acceptFriendBtn');
        var rejectFriendBtn = document.getElementById('rejectFriendBtn');
        
        console.log('Elements loaded');
        
        var predefinedAvatars = [
            { color: '#333' },
            { color: '#4CAF50' },
            { color: '#2196F3' },
            { color: '#9C27B0' },
            { color: '#FF5722' },
            { color: '#FFC107' },
            { color: '#F44336' },
            { color: '#00BCD4' }
        ];
        
        var personSVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" fill="#ffffff"/><path d="M12 14c-4.42 0-8 2.69-8 6v2h16v-2c0-3.31-3.58-6-8-6z" fill="#ffffff"/></svg>';
        
        var currentUser = null;
        var foundUser = null;
        var pendingRequest = null;
        var selectedFriend = null;
        
        function checkAuth() {
            console.log('checkAuth called');
            var user = localStorage.getItem('user');
            console.log('user from localStorage:', user);
            if (user) {
                currentUser = JSON.parse(user);
                userAvatar.classList.add('authenticated');
                
                if (currentUser.avatar !== undefined && predefinedAvatars[currentUser.avatar]) {
                    var avatar = predefinedAvatars[currentUser.avatar];
                    userAvatar.style.backgroundColor = avatar.color;
                    userAvatar.innerHTML = personSVG;
                } else {
                    userAvatar.style.backgroundColor = '#333';
                    userAvatar.innerHTML = personSVG;
                }
                
                loadFriends();
                checkFriendRequests();
            } else {
                userAvatar.classList.remove('authenticated');
                userAvatar.style.backgroundColor = '#333';
                userAvatar.innerHTML = personSVG;
            }
        }
        
        function getFriendRequests() {
            var requests = localStorage.getItem('friendRequests');
            if (API_BASE) {
                fetch(API_BASE + '/friends/request', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: currentUser.id, to: foundUser.id })
                }).then(r=>r.json()).then(data=>{
                    if (data.error) friendResult.innerHTML = '<p style="color: #ff6b6b;">'+data.error+'</p>';
                    else { friendResult.innerHTML = '<p style="color: #4CAF50;">Запрос отправлен!</p>'; addFriendBtn.style.display='none'; friendIdInput.value=''; }
                }).catch(()=> friendResult.innerHTML = '<p style="color: #ff6b6b;">Ошибка сети</p>');
                return;
            }
            
        
        function saveFriends(friends) {
            localStorage.setItem('friends', JSON.stringify(friends));
        }
        
        function loadFriends() {
            if (!currentUser) return;
            friendsBar.innerHTML = '';
            if (API_BASE) {
                fetch(API_BASE + '/friends/' + encodeURIComponent(currentUser.id)).then(r => r.json()).then(async (myFriends) => {
                    const users = await fetch(API_BASE + '/users').then(r=>r.json()).catch(()=>[]);
                    myFriends.forEach(function(friendship) {
                        var friendId = friendship.user1 === currentUser.id ? friendship.user2 : friendship.user1;
                        var friend = users.find(function(u) { return u.id === friendId; });
                        if (friend) {
                            var friendAvatar = document.createElement('div');
                            friendAvatar.className = 'friend-avatar';
                            if (friend.avatar !== undefined && predefinedAvatars[friend.avatar]) {
                                var avatar = predefinedAvatars[friend.avatar];
                                friendAvatar.style.backgroundColor = avatar.color;
                            }
                            friendAvatar.innerHTML = personSVG;
                            friendAvatar.dataset.friendId = friendId;
                            if (selectedFriend && selectedFriend.id === friendId) friendAvatar.classList.add('active');
                            friendAvatar.addEventListener('click', function() { selectFriend(friend); });
                            friendsBar.appendChild(friendAvatar);
                        }
                    });
                }).catch(err => console.error('Failed to load friends from API', err));
                return;
            }

            var friends = getFriends();
            var users = JSON.parse(localStorage.getItem('users') || '[]');

            var myFriends = friends.filter(function(f) {
                return f.user1 === currentUser.id || f.user2 === currentUser.id;
            });

            myFriends.forEach(function(friendship) {
                var friendId = friendship.user1 === currentUser.id ? friendship.user2 : friendship.user1;
                var friend = users.find(function(u) {
                    return u.id === friendId;
                });

                if (friend) {
                    var friendAvatar = document.createElement('div');
                    friendAvatar.className = 'friend-avatar';

                    if (friend.avatar !== undefined && predefinedAvatars[friend.avatar]) {
                        var avatar = predefinedAvatars[friend.avatar];
                        friendAvatar.style.backgroundColor = avatar.color;
                    }

                    friendAvatar.innerHTML = personSVG;
                    friendAvatar.dataset.friendId = friendId;

                    if (selectedFriend && selectedFriend.id === friendId) {
                        friendAvatar.classList.add('active');
                    }

                    friendAvatar.addEventListener('click', function() {
                        selectFriend(friend);
                    });
                    friendsBar.appendChild(friendAvatar);
                }
            });
        }
        
        function selectFriend(friend) {
            selectedFriend = friend;
            loadFriends();
            loadChatMessages();
        }
        
        function getChatMessages() {
            var messages = localStorage.getItem('chatMessages');
            if (!messages) return [];
            try {
                return JSON.parse(messages);
            } catch (e) {
                console.error('Invalid chatMessages in localStorage, clearing it:', e);
                localStorage.removeItem('chatMessages');
                return [];
            }
        }
        
        function saveChatMessages(messages) {
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }
        
        function loadChatMessages() {
            console.log('loadChatMessages called');
            chatMessages.innerHTML = '';
                var users = JSON.parse(localStorage.getItem('users') || '[]');
            
            var allMessages = getChatMessages();
            console.log('allMessages:', allMessages);
            
            if (!selectedFriend) {
                var selfMessages = allMessages.filter(function(m) {
                    return m.chatId === 'self';
                });
                console.log('selfMessages:', selfMessages);
                
                if (selfMessages.length === 0) {
                    chatMessages.innerHTML = '<p style="color: #666; text-align: center; margin-top: 20px;">Напишите сообщение или выберите друга для чата</p>';
                    return;
                }
                
                var users = JSON.parse(localStorage.getItem('users') || '[]');
                selfMessages.forEach(function(msg) {
                    var messageDiv = document.createElement('div');
                    messageDiv.className = 'message sent';

                    var avatarDiv = document.createElement('div');
                    avatarDiv.className = 'message-avatar';
                    if (currentUser && currentUser.avatar !== undefined && predefinedAvatars[currentUser.avatar]) {
                        avatarDiv.style.backgroundColor = predefinedAvatars[currentUser.avatar].color;
                    }
                    avatarDiv.innerHTML = personSVG;

                        var bubble = document.createElement('div');
                        bubble.className = 'message-bubble';
                        var textDiv = document.createElement('div');
                        textDiv.textContent = msg.text;

                        var timeDiv = document.createElement('div');
                        timeDiv.className = 'message-time';
                        var date = new Date(msg.timestamp);
                        timeDiv.textContent = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');

                        bubble.appendChild(textDiv);
                        bubble.appendChild(timeDiv);

                        // add delete button for messages from current user
                        if (currentUser && msg.from === currentUser.id) {
                            var delBtn = document.createElement('button');
                            delBtn.className = 'delete-btn';
                            delBtn.title = 'Удалить сообщение';
                            delBtn.textContent = '×';
                            delBtn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                deleteMessage(msg.chatId, msg.timestamp);
                            });
                            bubble.appendChild(delBtn);
                        }

                        messageDiv.appendChild(avatarDiv);
                        messageDiv.appendChild(bubble);

                        chatMessages.appendChild(messageDiv);
                });
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
                return;
            }
            
            var chatId = getChatId(currentUser.id, selectedFriend.id);
            var messages = allMessages.filter(function(m) {
                return m.chatId === chatId;
            });
            
            messages.forEach(function(msg) {
                var messageDiv = document.createElement('div');
                messageDiv.className = msg.from === currentUser.id ? 'message sent' : 'message received';

                var avatarDiv = document.createElement('div');
                avatarDiv.className = 'message-avatar';
                var fromUser = users.find(function(u) { return u.id === msg.from; }) || (msg.from === currentUser.id ? currentUser : null);
                if (fromUser && fromUser.avatar !== undefined && predefinedAvatars[fromUser.avatar]) {
                    avatarDiv.style.backgroundColor = predefinedAvatars[fromUser.avatar].color;
                }
                avatarDiv.innerHTML = personSVG;

                var bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                var textDiv = document.createElement('div');
                textDiv.textContent = msg.text;

                var timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                var date = new Date(msg.timestamp);
                timeDiv.textContent = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');

                bubble.appendChild(textDiv);
                bubble.appendChild(timeDiv);

                if (currentUser && msg.from === currentUser.id) {
                    var delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.title = 'Удалить сообщение';
                    delBtn.textContent = '×';
                    delBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        deleteMessage(msg.chatId, msg.timestamp);
                    });
                    bubble.appendChild(delBtn);
                }

                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(bubble);

                chatMessages.appendChild(messageDiv);
            });
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function getChatId(user1, user2) {
            return [user1, user2].sort().join('_');
        }
        
        function sendMessage() {
            console.log('sendMessage called');
            var text = chatInput.value.trim();
            console.log('text:', text);
            if (!text) return;
            
            if (!currentUser) {
                console.log('No currentUser, redirecting to auth');
                window.location.href = 'auth.html';
                return;
            }
            
            console.log('currentUser:', currentUser);
            console.log('selectedFriend:', selectedFriend);
            
            var allMessages = getChatMessages();

            // ensure current user is stored permanently in users
            try {
                var users = JSON.parse(localStorage.getItem('users') || '[]');
                if (currentUser && !users.find(function(u) { return u.id === currentUser.id; })) {
                    users.push({ id: currentUser.id, name: currentUser.name || ('User ' + currentUser.id), avatar: currentUser.avatar });
                    localStorage.setItem('users', JSON.stringify(users));
                }
            } catch (e) {
                console.error('Error ensuring user persisted:', e);
            }
            console.log('allMessages:', allMessages);
            
            if (selectedFriend) {
                var chatId = getChatId(currentUser.id, selectedFriend.id);
                console.log('chatId:', chatId);
                
                var newMessage = {
                    chatId: chatId,
                    from: currentUser.id,
                    to: selectedFriend.id,
                    text: text,
                    timestamp: Date.now()
                };
                
                allMessages.push(newMessage);
            } else {
                var newMessage = {
                    chatId: 'self',
                    from: currentUser.id,
                    to: 'self',
                    text: text,
                    timestamp: Date.now()
                };
                
                allMessages.push(newMessage);
            }
            
            saveChatMessages(allMessages);
            
            chatInput.value = '';
            loadChatMessages();
            console.log('Message sent');
        }
        
        function checkFriendRequests() {
            if (!currentUser) return;
            if (API_BASE) {
                // fetch friend requests server-side
                fetch(API_BASE + '/users').then(r=>r.json()).then(users=>{
                    fetch(API_BASE + '/friends/' + encodeURIComponent(currentUser.id)).then(r=>r.json()).then(function(){
                        // server does not expose friendRequests list endpoint in this version; skip for now
                    }).catch(()=>{});
                }).catch(()=>{});
                return;
            }

            var requests = getFriendRequests();
            var pendingRequest = requests.find(function(r) {
                return r.to === currentUser.id && r.status === 'pending';
            });

            if (pendingRequest) {
                var users = JSON.parse(localStorage.getItem('users') || '[]');
                var fromUser = users.find(function(u) {
                    return u.id === pendingRequest.from;
                });

                if (fromUser) {
                    notificationText.textContent = fromUser.name + ' хочет добавить вас в друзья. Нравится ли вы общаться с этим человеком?';
                    window.pendingRequest = pendingRequest;
                    notificationModal.classList.add('active');
                }
            }
        }
        
        function searchFriend() {
            var friendId = friendIdInput.value.trim();
            
            if (!friendId) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Введите ID пользователя</p>';
                return;
            }
            
            if (friendId === currentUser.id) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Нельзя добавить самого себя</p>';
                return;
            }
            
            if (API_BASE) {
                fetch(API_BASE + '/users/' + encodeURIComponent(friendId)).then(r => r.json()).then(function(user) {
                    if (user.error) {
                        friendResult.innerHTML = '<p style="color: #ff6b6b;">Пользователь не найден</p>';
                        addFriendBtn.style.display = 'none';
                        return;
                    }
                    // check friendship via API friends list
                    fetch(API_BASE + '/friends/' + encodeURIComponent(currentUser.id)).then(r=>r.json()).then(function(frList){
                        var alreadyFriends = frList.some(function(f){ return (f.user1===currentUser.id && f.user2===user.id) || (f.user1===user.id && f.user2===currentUser.id); });
                        if (alreadyFriends) {
                            friendResult.innerHTML = '<p style="color: #ff6b6b;">Вы уже друзья с этим пользователем</p>';
                            addFriendBtn.style.display = 'none';
                            return;
                        }
                        foundUser = user;
                        friendResult.innerHTML = '<p><strong>Имя:</strong> ' + user.name + '</p><p><strong>ID:</strong> ' + user.id + '</p>';
                        addFriendBtn.style.display = 'block';
                    }).catch(function(){ foundUser = user; friendResult.innerHTML = '<p><strong>Имя:</strong> ' + user.name + '</p><p><strong>ID:</strong> ' + user.id + '</p>'; addFriendBtn.style.display='block'; });
                }).catch(function() { friendResult.innerHTML = '<p style="color: #ff6b6b;">Пользователь не найден</p>'; addFriendBtn.style.display='none'; });
                return;
            }

            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var user = users.find(function(u) {
                return u.id === friendId;
            });

            if (!user) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Пользователь не найден</p>';
                addFriendBtn.style.display = 'none';
                return;
            }

            var friends = getFriends();
            var alreadyFriends = friends.some(function(f) {
                return (f.user1 === currentUser.id && f.user2 === friendId) ||
                       (f.user1 === friendId && f.user2 === currentUser.id);
            });

            if (alreadyFriends) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Вы уже друзья с этим пользователем</p>';
                addFriendBtn.style.display = 'none';
                return;
            }

            foundUser = user;
            friendResult.innerHTML = '<p><strong>Имя:</strong> ' + user.name + '</p><p><strong>ID:</strong> ' + user.id + '</p>';
            addFriendBtn.style.display = 'block';
        }
        
        function sendFriendRequest() {
            if (!foundUser) return;
            
            var requests = getFriendRequests();
            
            var existingRequest = requests.find(function(r) {
                return (r.from === currentUser.id && r.to === foundUser.id) ||
                       (r.from === foundUser.id && r.to === currentUser.id);
            });
            
            if (existingRequest) {
                friendResult.innerHTML = '<p style="color: #ff6b6b;">Запрос уже существует</p>';
                return;
            }
            
            var newRequest = {
                from: currentUser.id,
                to: foundUser.id,
                status: 'pending',
                timestamp: Date.now()
            };
            
            requests.push(newRequest);
            saveFriendRequests(requests);
            
            friendResult.innerHTML = '<p style="color: #4CAF50;">Запрос отправлен!</p>';
            addFriendBtn.style.display = 'none';
            friendIdInput.value = '';
        }
        
        function acceptFriendRequest() {
            if (!window.pendingRequest) return;
            if (API_BASE) {
                fetch(API_BASE + '/friends/accept', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: window.pendingRequest.from, to: window.pendingRequest.to })
                }).then(r=>r.json()).then(()=>{
                    loadFriends();
                }).catch(err => console.error('Failed to accept friend via API', err));
                notificationModal.classList.remove('active');
                window.pendingRequest = null;
                return;
            }

            var requests = getFriendRequests();
            var requestIndex = requests.findIndex(function(r) {
                return r.from === window.pendingRequest.from && r.to === window.pendingRequest.to;
            });

            if (requestIndex !== -1) {
                requests[requestIndex].status = 'accepted';
                saveFriendRequests(requests);

                var friends = getFriends();
                friends.push({
                    user1: window.pendingRequest.from,
                    user2: window.pendingRequest.to,
                    timestamp: Date.now()
                });
                saveFriends(friends);

                loadFriends();
            }

            notificationModal.classList.remove('active');
            window.pendingRequest = null;
        }
        
        function rejectFriendRequest() {
            if (!window.pendingRequest) return;
            
            var requests = getFriendRequests();
            var filteredRequests = requests.filter(function(r) {
                return !(r.from === window.pendingRequest.from && r.to === window.pendingRequest.to);
            });
            saveFriendRequests(filteredRequests);
            
            notificationModal.classList.remove('active');
            window.pendingRequest = null;
        }

        function deleteMessage(chatId, timestamp) {
            var messages = getChatMessages();
            var filtered = messages.filter(function(m) {
                return !(m.chatId === chatId && m.timestamp === timestamp);
            });
            saveChatMessages(filtered);
            loadChatMessages();
        }
        
        burger.addEventListener('click', function() {
            burgerMenu.classList.toggle('active');
        });
        
        userIcon.addEventListener('click', function(e) {
            var user = localStorage.getItem('user');
            if (user) {
                e.preventDefault();
                userMenu.classList.toggle('active');
            } else {
                window.location.href = 'auth.html';
            }
        });
        
        profileBtn.addEventListener('click', function() {
            userMenu.classList.remove('active');
            window.open('profile.html', '_blank');
        });
        
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('user');
            userMenu.classList.remove('active');
            checkAuth();
        });
        
        findFriendBtn.addEventListener('click', function() {
            if (!currentUser) {
                window.location.href = 'auth.html';
                return;
            }
            burgerMenu.classList.remove('active');
            friendModal.classList.add('active');
        });
        
        closeFriendModalBtn.addEventListener('click', function() {
            friendModal.classList.remove('active');
            friendResult.innerHTML = '';
            friendIdInput.value = '';
            addFriendBtn.style.display = 'none';
            foundUser = null;
        });
        
        searchFriendBtn.addEventListener('click', searchFriend);
        
        addFriendBtn.addEventListener('click', sendFriendRequest);
        
        acceptFriendBtn.addEventListener('click', acceptFriendRequest);
        
        rejectFriendBtn.addEventListener('click', rejectFriendRequest);
        
        chatSendBtn.addEventListener('click', function() {
            console.log('chatSendBtn clicked');
            sendMessage();
        });
        
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        document.addEventListener('click', function(e) {
            if (!burger.contains(e.target) && !burgerMenu.contains(e.target)) {
                burgerMenu.classList.remove('active');
            }
            if (!userIcon.contains(e.target) && !userMenu.contains(e.target)) {
                userMenu.classList.remove('active');
            }
        });
        
        console.log('Calling checkAuth');
        checkAuth();
        console.log('Calling loadChatMessages');
        loadChatMessages();
    </script>
</body>
</html>
